server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Backend already mounts routers under /api/... (e.g. APIRouter(prefix="/api/alerts")),
    # so we forward without rewriting the path. proxy_pass without a URI part
    # preserves the original request URI exactly.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket upgrade. WS_PATH defaults to /ws/alerts; we match the /ws prefix
    # so any future WS endpoints under /ws/... also upgrade correctly.
    location /ws {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_read_timeout 3600s;
    }

    # SPA fallback — Vite/React router handles client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
