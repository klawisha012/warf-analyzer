worker_processes 1;
events { worker_connections 1024; }

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;
  keepalive_timeout 65;
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

  server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's embedded DNS resolver for lazy upstream resolution
    resolver 127.0.0.11 valid=30s ipv6=off;

    # API: /api/* -> backend root (strip /api/ prefix before proxying)
    location /api/ {
      set $backend_upstream http://backend:8765;
      rewrite ^/api/(.*)$ /$1 break;
      proxy_pass $backend_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_http_version 1.1;
      # /me/* endpoints fan out to many WFM calls; even with the in-process
      # AsyncLimiter (3 req/s) + asyncio.gather the cold-cache wall time for
      # /me/sets-profit on a full prime catalogue can hit ~30–90s. 120s leaves
      # headroom without masking a hard failure (we still want to see 504 if
      # the backend genuinely hangs).
      proxy_read_timeout 120s;
    }

    # Centrifugo WebSocket
    #
    # NOTE: must pass `$request_uri`, not a literal path. nginx skips its
    # automatic prefix-rewrite for `proxy_pass` URLs that come from a
    # variable, so `proxy_pass $cf/connection/;` would send `/connection/`
    # to the upstream regardless of what came after — turning the actual
    # request `/connection/websocket` into a 404 from Centrifugo. Using
    # `$request_uri` preserves the original path (and query string) while
    # still using runtime DNS resolution via the docker resolver.
    location /connection/ {
      set $centrifugo_upstream http://centrifugo:8000;
      proxy_pass $centrifugo_upstream$request_uri;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_read_timeout 1h;
    }

    # SPA fallback
    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
