worker_processes 1;
events { worker_connections 1024; }

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;
  keepalive_timeout 65;
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

  server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's embedded DNS resolver for lazy upstream resolution
    resolver 127.0.0.11 valid=30s ipv6=off;

    # API: /api/* -> backend root (strip /api/ prefix before proxying)
    location /api/ {
      set $backend_upstream http://backend:8765;
      rewrite ^/api/(.*)$ /$1 break;
      proxy_pass $backend_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_http_version 1.1;
      proxy_read_timeout 60s;
    }

    # Centrifugo WebSocket
    location /connection/ {
      set $centrifugo_upstream http://centrifugo:8000;
      proxy_pass $centrifugo_upstream/connection/;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_read_timeout 1h;
    }

    # SPA fallback
    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
