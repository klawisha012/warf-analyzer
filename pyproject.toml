[project]
name = "alecaframe-api"
version = "0.1.0"
description = "Off-line FastAPI backend for AlecaFrame Warframe inventory."
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.136.3",
    "pydantic-settings>=2.14.1",
    "uvicorn[standard]>=0.48.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/alecaframe_api"]

[project.scripts]
alecaframe-api = "alecaframe_api.main:run"
