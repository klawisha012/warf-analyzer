name: alecaframe

x-backend-env: &backend-env
  ALECA_AGENT_URL: ${ALECA_AGENT_URL:-http://host.docker.internal:8788}
  ALECA_REDIS_URL: ${ALECA_REDIS_URL:-redis://redis:6379/0}
  ALECA_RABBITMQ_URL: ${ALECA_RABBITMQ_URL:-amqp://aleca:aleca-local@rabbitmq:5672/}
  ALECA_CENTRIFUGO_API: http://centrifugo:8000/api
  ALECA_CENTRIFUGO_API_KEY: ${CENTRIFUGO_API_KEY:-local-dev-api-key-change-me}
  ALECA_CENTRIFUGO_TOKEN_HMAC_SECRET: ${CENTRIFUGO_TOKEN_HMAC_SECRET:-local-dev-hmac-secret-change-me-do-not-use-in-prod-or-with-real-data}
  ALECA_DATA_DIR: /data
  # AlecaFrame's host directory is bind-mounted into the container at
  # /aleca-data (see backend.volumes); the path itself is set on the host
  # via ALECA_DATA_HOME_HOST. sets_loader + NameResolver read from here.
  ALECA_DATA_HOME: /aleca-data
  ALECA_TTL_SECONDS: ${ALECA_TTL_SECONDS:-60}
  ALECA_WFM_PLATFORM: ${ALECA_WFM_PLATFORM:-pc}
  ALECA_LOG_LEVEL: ${ALECA_LOG_LEVEL:-INFO}
  TG_API_KEY: ${TG_API_KEY:-}

services:
  redis:
    image: redis:7-alpine
    container_name: aleca-redis
    restart: unless-stopped
    ports: ["127.0.0.1:6379:6379"]
    volumes:
      - redis-data:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: aleca-rabbitmq
    restart: unless-stopped
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: aleca
      RABBITMQ_DEFAULT_PASS: aleca-local
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
      - ./docker/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./docker/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  centrifugo:
    image: centrifugo/centrifugo:v6
    container_name: aleca-centrifugo
    restart: unless-stopped
    ports: ["127.0.0.1:8002:8000"]
    environment:
      CENTRIFUGO_HTTP_API_KEY: ${CENTRIFUGO_API_KEY:-local-dev-api-key-change-me}
      CENTRIFUGO_CLIENT_TOKEN_HMAC_SECRET_KEY: ${CENTRIFUGO_TOKEN_HMAC_SECRET:-local-dev-hmac-secret-change-me-do-not-use-in-prod-or-with-real-data}
    volumes: ["./docker/centrifugo/config.json:/centrifugo/config.json:ro"]
    command: ["centrifugo", "-c", "/centrifugo/config.json"]
    ulimits:
      nofile: { soft: 65536, hard: 65536 }
    healthcheck:
      test:
        - "CMD"
        - "sh"
        - "-c"
        - "wget -qO- --header=\"X-API-Key: $${CENTRIFUGO_HTTP_API_KEY}\" --post-data='{}' --header='Content-Type: application/json' http://127.0.0.1:8000/api/info >/dev/null"
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: aleca-backend
    restart: unless-stopped
    ports: ["127.0.0.1:8765:8765"]
    environment:
      <<: *backend-env
    volumes:
      - ./data:/data
      # AlecaFrame cachedData (Warframes.json, Primary.json, ...) mounted ro.
      # ALECA_DATA_HOME_HOST in .env points at the host dir (e.g.
      # %LOCALAPPDATA%/AlecaFrame on Windows). Fallback to ./data so missing
      # env var doesn't break docker compose up; loader logs a warning and
      # falls through to the hardcoded seed.
      - ${ALECA_DATA_HOME_HOST:-./data}:/aleca-data:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      centrifugo: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8765/healthz',timeout=3).status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  poller:
    build:
      context: .
      dockerfile: docker/poller/Dockerfile
    container_name: aleca-poller
    restart: unless-stopped
    command: ["alecaframe-poller"]
    environment:
      <<: *backend-env
    volumes:
      - ./data:/data:ro
      - ${ALECA_DATA_HOME_HOST:-./data}:/aleca-data:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: aleca-frontend
    restart: unless-stopped
    ports: ["127.0.0.1:3000:80"]
    depends_on:
      backend: { condition: service_started }
      centrifugo: { condition: service_started }
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  redis-data:
  rabbitmq-data:
